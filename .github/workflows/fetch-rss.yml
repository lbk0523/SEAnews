name: Fetch RSS Feeds
 
on:
  schedule:
    - cron: '0 0 * * *'   # 매일 UTC 00:00 (한국시간 오전 9시) 자동 실행
  workflow_dispatch:        # 수동 실행 버튼도 활성화
 
jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write       # 파일 커밋 권한
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests feedparser
 
      - name: Run RSS fetch script
        run: python scripts/fetch_rss.py
 
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "chore: update RSS data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
