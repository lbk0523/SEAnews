<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEA Game Pulse — Southeast Asia Gaming News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&family=Noto+Sans+KR:wght@400;500;700&family=Source+Serif+4:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:        #111316;
  --ink-light:  #3a3f47;
  --ink-faint:  #8a919c;
  --paper:      #f5f2ed;
  --paper-warm: #ede9e1;
  --paper-card: #faf8f5;
  --rule:       #d4cfc6;
  --accent:     #c0392b;
  --accent-ai:  #1a6b3c;
  --white:      #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Source Sans 3', 'Noto Sans KR', sans-serif;
  line-height: 1.6;
}

/* ── MASTHEAD ── */
.masthead {
  background: var(--white);
  border-bottom: 3px double var(--ink);
  padding: 0 40px;
}
.masthead-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0 14px;
  border-bottom: 1px solid var(--rule);
}
.dateline {
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
  min-width: 180px;
}
.pub-title { text-align: center; }
.publication-name {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 3rem;
  line-height: 1;
  color: var(--ink);
}
.publication-tagline {
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-top: 4px;
}
.masthead-right {
  min-width: 180px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.updated-time {
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
}
.ai-badge {
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid var(--accent-ai);
  color: var(--accent-ai);
}

/* ── NAV ── */
.nav-bar {
  background: var(--ink);
  padding: 0 40px;
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }
.nav-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.5);
  padding: 11px 18px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  min-height: 44px;
}
.nav-btn:hover  { color: var(--white); }
.nav-btn.active { color: var(--white); border-bottom-color: var(--accent); }

/* ── STATS ── */
.stats-ribbon {
  background: var(--paper-warm);
  border-bottom: 1px solid var(--rule);
  padding: 9px 40px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.stat-item { display: flex; align-items: baseline; gap: 5px; }
.stat-num  { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.1rem; color: var(--accent); }
.stat-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }
.stat-sep   { width: 1px; height: 16px; background: var(--rule); }

/* ── MAIN ── */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 36px 40px 60px;
}

.page-status {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-faint);
  font-size: 0.9rem;
}
.page-status strong {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--ink);
  margin-bottom: 8px;
}

/* ── SOURCE SECTION ── */
.source-section {
  margin-bottom: 52px;
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp 0.45s ease forwards;
}
@keyframes fadeUp { to { opacity: 1; transform: none; } }

.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 4px;
}
.section-flag   { font-size: 1.1rem; }
.section-name   { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; }
.section-region { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }

.section-rule {
  height: 1px;
  background: var(--rule);
  margin-bottom: 18px;
  position: relative;
}
.section-rule::before {
  content: '';
  position: absolute;
  left: 0; top: -1px;
  height: 3px; width: 56px;
  background: var(--accent);
}

/* ── 3-COLUMN GRID ── */
.articles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}

.article-card {
  background: var(--paper-card);
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  transition: background 0.15s;
  overflow: hidden;
}
.article-card:hover { background: var(--white); }
.article-card:first-child { border-left: 3px solid var(--accent); }

/* 썸네일 */
.card-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
  background: var(--paper-warm);
  flex-shrink: 0;
}

/* 카드 본문 */
.card-body {
  padding: 18px 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-source-tag {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--accent);
  padding: 2px 7px;
}
.card-badge {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 1px 6px;
}
.card-date {
  font-size: 0.68rem;
  color: var(--ink-faint);
  margin-left: auto;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.35;
  color: var(--ink);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-card:first-child .card-title {
  font-size: 1.2rem;
  -webkit-line-clamp: 4;
}
.card-title-orig {
  font-size: 0.72rem;
  color: var(--ink-faint);
  font-style: italic;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* AI 요약 영역 */
.card-ai-summary {
  border-top: 1px solid var(--rule);
  padding-top: 10px;
  flex: 1;
}
.card-ai-label {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent-ai);
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-ai-points {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card-ai-points li {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.8rem;
  color: var(--ink-light);
  line-height: 1.6;
  padding-left: 12px;
  position: relative;
}
.card-ai-points li::before {
  content: '•';
  position: absolute;
  left: 0;
  color: var(--accent-ai);
  font-weight: 700;
}

/* 요약 없을 때 폴백 */
.card-no-summary {
  font-size: 0.75rem;
  color: var(--ink-faint);
  font-style: italic;
  padding-top: 8px;
  border-top: 1px solid var(--rule);
}

.card-readmore {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.15s;
  margin-top: 4px;
}
.article-card:hover .card-readmore { opacity: 1; }

/* ── ERROR ── */
.source-error {
  padding: 16px 20px;
  border-left: 3px solid var(--rule);
  background: var(--white);
  font-size: 0.78rem;
  color: var(--ink-faint);
}

.source-section.hidden { display: none; }

/* ── RESPONSIVE ── */

/* 태블릿 (≤ 900px) */
@media (max-width: 900px) {
  .masthead, .nav-bar, .stats-ribbon, main {
    padding-left: 20px;
    padding-right: 20px;
  }
  .publication-name { font-size: 2rem; }
  .dateline { min-width: 140px; font-size: 0.65rem; }
  .masthead-right { min-width: 140px; }
  .articles-grid { grid-template-columns: repeat(2, 1fr); }
  .article-card:first-child {
    border-left: none;
    border-top: 3px solid var(--accent);
  }
}

/* 모바일 (≤ 600px) */
@media (max-width: 600px) {
  /* 헤더: 세로 스택 레이아웃 */
  .masthead {
    padding: 0 16px;
  }
  .masthead-top {
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 14px 0 12px;
  }
  .dateline {
    min-width: unset;
    text-align: center;
    font-size: 0.62rem;
    order: 2;
  }
  .pub-title {
    order: 1;
  }
  .publication-name {
    font-size: 1.75rem;
  }
  .publication-tagline {
    font-size: 0.62rem;
    letter-spacing: 0.16em;
  }
  .masthead-right {
    min-width: unset;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    order: 3;
    gap: 10px;
  }
  .updated-time {
    font-size: 0.62rem;
  }

  /* 내비게이션 */
  .nav-bar {
    padding: 0 8px;
  }
  .nav-btn {
    padding: 12px 14px;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
  }

  /* 통계 리본 */
  .stats-ribbon {
    padding: 8px 16px;
    gap: 12px;
  }
  .stat-sep { display: none; }
  .stat-num { font-size: 1rem; }
  .stat-label { font-size: 0.65rem; }

  /* 본문 */
  main {
    padding: 20px 12px 40px;
  }

  /* 섹션 헤더 */
  .source-section {
    margin-bottom: 36px;
  }
  .section-name { font-size: 1.15rem; }
  .section-region { display: none; }

  /* 카드 그리드: 1열 */
  .articles-grid {
    grid-template-columns: 1fr;
  }

  /* 카드 레이아웃: 가로형 (썸네일 + 내용 나란히) */
  .article-card {
    flex-direction: row;
    min-height: 0;
  }
  .card-thumb {
    width: 120px;
    min-width: 120px;
    aspect-ratio: unset;
    height: auto;
    align-self: stretch;
    object-fit: cover;
  }
  .card-body {
    padding: 12px 14px 14px;
    gap: 7px;
    min-width: 0;
  }
  .card-title {
    font-size: 0.92rem;
    -webkit-line-clamp: 3;
  }
  .article-card:first-child {
    flex-direction: column;
    border-top: 3px solid var(--accent);
  }
  .article-card:first-child .card-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    height: auto;
  }
  .article-card:first-child .card-body {
    padding: 14px 16px 16px;
  }
  .article-card:first-child .card-title {
    font-size: 1.05rem;
  }

  /* AI 요약: 모바일에서 축약 */
  .card-ai-points li {
    font-size: 0.75rem;
  }

  /* 읽기 더보기 버튼: 모바일에서 항상 표시 */
  .card-readmore {
    opacity: 1;
  }
}

/* 아주 작은 화면 (≤ 360px) */
@media (max-width: 360px) {
  .publication-name { font-size: 1.5rem; }
  .card-thumb {
    width: 100px;
    min-width: 100px;
  }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-top">
    <span class="dateline" id="dateline"></span>
    <div class="pub-title">
      <div class="publication-name">SEA Game Pulse</div>
      <div class="publication-tagline">Southeast Asia Gaming News Digest</div>
    </div>
    <div class="masthead-right">
      <span class="updated-time" id="updatedTime"></span>
      <span class="ai-badge" id="aiBadge" style="display:none">🤖 AI 요약</span>
    </div>
  </div>
</header>

<nav class="nav-bar">
  <button class="nav-btn active" onclick="filterRegion('all',this)">All Regions</button>
  <button class="nav-btn" onclick="filterRegion('sea',this)">SEA Wide</button>
  <button class="nav-btn" onclick="filterRegion('ph',this)">Philippines</button>
  <button class="nav-btn" onclick="filterRegion('vn',this)">Vietnam</button>
  <button class="nav-btn" onclick="filterRegion('th',this)">Thailand</button>
  <button class="nav-btn" onclick="filterRegion('id',this)">Indonesia</button>
  <button class="nav-btn" onclick="filterRegion('my',this)">Malaysia</button>
</nav>

<div class="stats-ribbon">
  <div class="stat-item">
    <span class="stat-num" id="totalCount">—</span>
    <span class="stat-label">Articles</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat-item">
    <span class="stat-num" id="sourceCount">—</span>
    <span class="stat-label">Sources</span>
  </div>
  <div class="stat-sep"></div>
  <div class="stat-item"><span class="stat-num">6</span><span class="stat-label">Countries</span></div>
</div>

<main id="mainContent">
  <div class="page-status"><strong>Loading…</strong>Fetching latest articles</div>
</main>

<script>
function filterRegion(region, el) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.source-section').forEach(sec => {
    sec.classList.toggle('hidden', region !== 'all' && sec.dataset.region !== region);
  });
}

function buildSummaryHTML(summaryText) {
  if (!summaryText) {
    return `<div class="card-no-summary">AI 요약을 불러올 수 없습니다.</div>`;
  }
  const points = summaryText
    .split('\n')
    .map(p => p.trim())
    .filter(p => p.length > 0);

  const items = points.map(p => `<li>${p}</li>`).join('');
  return `
    <div class="card-ai-summary">
      <div class="card-ai-label">🤖 AI 요약</div>
      <ul class="card-ai-points">${items}</ul>
    </div>`;
}

function buildCardHTML(art, src, idx) {
  const isLead = idx === 0;
  const hasThumbnail = art.thumbnail && art.thumbnail.startsWith('http');

  const thumbHTML = hasThumbnail
    ? `<img class="card-thumb" src="${art.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : '';

  return `
    <a class="article-card" href="${art.link}" target="_blank" rel="noopener">
      ${thumbHTML}
      <div class="card-body">
        <div class="card-meta">
          <span class="card-source-tag">${src.name}</span>
          ${isLead ? '<span class="card-badge">Latest</span>' : ''}
          ${art.date ? `<span class="card-date">${art.date}</span>` : ''}
        </div>
        <div class="card-title">${art.title_ko || art.title}</div>
        ${art.title_ko ? `<div class="card-title-orig">${art.title}</div>` : ''}
        ${buildSummaryHTML(art.summary_ko)}
        <div class="card-readmore">Read article →</div>
      </div>
    </a>`;
}

function render(data) {
  document.getElementById('updatedTime').textContent = `Updated ${data.updated_at}`;
  document.getElementById('dateline').textContent =
    new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  if (data.ai_summary) {
    document.getElementById('aiBadge').style.display = 'inline-block';
  }

  const activeSources = data.sources.filter(s => !s.error).length;
  const total = data.sources.reduce((s, src) => s + src.articles.length, 0);
  document.getElementById('totalCount').textContent = total;
  document.getElementById('sourceCount').textContent = activeSources;

  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  data.sources.forEach((src, si) => {
    const sec = document.createElement('section');
    sec.className = 'source-section';
    sec.dataset.region = src.region;
    sec.style.animationDelay = `${si * 70}ms`;

    let cardsHTML = '';
    if (src.error || !src.articles.length) {
      cardsHTML = `<div class="source-error">이 소스에서 기사를 불러오지 못했습니다.</div>`;
    } else {
      cardsHTML = `<div class="articles-grid">
        ${src.articles.map((art, i) => buildCardHTML(art, src, i)).join('')}
      </div>`;
    }

    sec.innerHTML = `
      <div class="section-header">
        <span class="section-flag">${src.flag}</span>
        <span class="section-name">${src.name}</span>
        <span class="section-region">${src.regionLabel}</span>
      </div>
      <div class="section-rule"></div>
      ${cardsHTML}`;

    main.appendChild(sec);
  });
}

fetch('data.json')
  .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
  .then(data => render(data))
  .catch(err => {
    document.getElementById('mainContent').innerHTML = `
      <div class="page-status">
        <strong>데이터를 불러올 수 없습니다</strong>
        GitHub Actions를 실행하여 data.json을 생성해주세요.<br><br>
        <small style="color:var(--ink-faint)">${err.message}</small>
      </div>`;
  });

document.getElementById('dateline').textContent =
  new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
</script>
</body>
</html>
